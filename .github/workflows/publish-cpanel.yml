name: Publish Website to CPanel

on:
  push:
    branches:
      - main

concurrency:
  group: cpanel-deploy-main
  cancel-in-progress: true

jobs:
  FTP-Deploy-Action:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Tailwind + DaisyUI Assets
        run: npm run build

      - name: Remove Git metadata (prevent .git upload)
        shell: bash
        run: |
          rm -rf .git
          rm -rf .github

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          local-dir: ./
          # Set this secret to "./" if your FTP starts in /public_html/ems2.
          # Otherwise use "public_html/ems2/".
          server-dir: ${{ secrets.SERVER_DIR }}
          timeout: 120000
          exclude: |
            .git/**
            .github/**
            **/.env
            node_modules/**
            docs/**
            resources/**
            scripts/**
            tests/**
            vendor/**
            writable/cache/**
            writable/logs/**
            writable/session/**
            writable/uploads/**
            writable/debugbar/**
            **/.gitkeep
            phpunit.xml.dist
            package.json
            package-lock.json
            tailwind.config.js
            postcss.config.js
