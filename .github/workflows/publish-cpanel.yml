name: Publish Website to CPanel

on:
  push:
    branches:
      - main

concurrency:
  group: cpanel-deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Tailwind + DaisyUI Assets
        run: npm run build

      - name: Setup PHP (Composer)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Install Composer Dependencies (Production)
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          local-dir: ./
          # cPanel target folder (document root points to /ems2/public).
          # IMPORTANT: Most cPanel FTP accounts are chrooted, so DO NOT use
          # an absolute path like /home/<user>/public_html/... or you will get nested folders.
          # Default assumes FTP root is /home/<user>:
          #   /home/hark8423/public_html/ems2  =>  server-dir: public_html/ems2/
          # Override by defining secret SERVER_DIR if your FTP root differs.
          server-dir: ${{ secrets.SERVER_DIR || 'public_html/ems2/' }}
          # Increase tolerance for slower shared-hosting FTP servers
          timeout: 120000
          exclude: |
            **/.git*
            **/.github*
            **/.env
            node_modules/**
            # IMPORTANT: prevent deleting runtime data on the server
            writable/cache/**
            writable/logs/**
            writable/session/**
            writable/uploads/**
            writable/debugbar/**
            # vendor is large; keep it manual unless you fix PASV ports/firewall
            vendor/**
            docs/**
            resources/**
            scripts/**
            tests/**
            phpunit.xml.dist
            package.json
            package-lock.json
            tailwind.config.js
            postcss.config.js
