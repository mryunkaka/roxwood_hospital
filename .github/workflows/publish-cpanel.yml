name: Publish Roxwood Hospital to cPanel

on:
  push:
    branches:
      - main

jobs:
  FTP-Deploy-Action:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1 Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2 Setup Node untuk build Tailwind / Vite
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3 Install dependencies jika package.json ada
      - name: Install Node Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      # 4 Build asset jika project menggunakan Vite
      - name: Build Assets
        run: |
          if [ -f package.json ]; then
            npm run build
          fi

      # 5 Deploy via FTP
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.3
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

          protocol: ftp
          port: 21

          local-dir: ./
          server-dir: ./

          dangerous-clean-slate: false

          exclude: |
            **/.git*
            **/.github*
            **/.env
            **/.vscode*
            node_modules/**
            tests/**
            storage/logs/**
